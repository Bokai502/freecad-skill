name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ./freecad_cli_tools[dev]

      - name: Ruff
        run: python -m ruff check freecad_cli_tools/src freecad_cli_tools/tests scripts/benchmark_yaml_safe_move.py

      - name: Black
        run: python -m black --check freecad_cli_tools/src freecad_cli_tools/tests scripts/benchmark_yaml_safe_move.py

      - name: Pytest
        run: python -m pytest freecad_cli_tools/tests
